<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Beautiful phone silhouette -->
  <rect x="5" y="2" width="14" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="2" />
  <!-- Screen container -->
  <rect x="7" y="5" width="10" height="11" rx="1" fill="none" stroke="currentColor" stroke-width="1.5" />
  <!-- Home button -->
  <circle cx="12" cy="19" r="1" fill="currentColor" />
  
  <!-- QR Code mini pattern inside the phone screen -->
  <rect x="9" y="7" width="2" height="2" fill="url(#grad)" />
  <rect x="13" y="7" width="2" height="2" fill="url(#grad)" />
  <rect x="9" y="11" width="2" height="2" fill="url(#grad)" />
  <rect x="13" y="11" width="1" height="1" fill="url(#grad)" />
  <rect x="14" y="12" width="1" height="1" fill="url(#grad)" />
</svg>
